<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(212,175,55,0)" />
      <stop offset="30%" stop-color="rgba(212,175,55,0.1)" />
      <stop offset="100%" stop-color="rgba(212,175,55,0)" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F0E6C8"/>
      <stop offset="100%" stop-color="#B8960C"/>
    </linearGradient>
    <linearGradient id="labelBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(212,175,55,0.12)"/>
      <stop offset="50%" stop-color="rgba(212,175,55,0.05)"/>
      <stop offset="100%" stop-color="rgba(212,175,55,0.08)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>

  <!-- Glow behind bottle -->
  <ellipse cx="200" cy="320" rx="80" ry="120" fill="rgba(212,175,55,0.03)" filter="url(#glow)"/>

  <!-- Cap -->
  <rect x="178" y="80" width="44" height="28" rx="3" fill="url(#gold)" opacity="0.6"/>
  <rect x="182" y="84" width="36" height="20" rx="2" fill="url(#gold)" opacity="0.3"/>
  <line x1="178" y1="96" x2="222" y2="96" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>

  <!-- Neck -->
  <rect x="183" y="108" width="34" height="50" rx="3" fill="url(#body)" stroke="rgba(212,175,55,0.12)" stroke-width="0.5"/>
  <rect x="183" y="108" width="34" height="50" rx="3" fill="url(#shine)"/>

  <!-- Gold neck ring -->
  <rect x="180" y="160" width="40" height="5" rx="1" fill="url(#gold)" opacity="0.5"/>
  <rect x="180" y="168" width="40" height="2" rx="1" fill="rgba(212,175,55,0.2)"/>

  <!-- Main body -->
  <path d="M130,180 C130,90 145,170 165,170 L235,170 C255,170 270,90 270,180 C270,260 265,310 260,340 L140,340 C135,310 130,260 130,180Z" fill="url(#body)" stroke="rgba(212,175,55,0.1)" stroke-width="0.5"/>
  <path d="M130,180 C130,90 145,170 165,170 L235,170 C255,170 270,90 270,180 C270,260 265,310 260,340 L140,340 C135,310 130,260 130,180Z" fill="url(#shine)"/>

  <!-- Left highlight -->
  <path d="M133,190 C133,100 147,175 165,175" stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none"/>

  <!-- Label -->
  <rect x="156" y="200" width="88" height="95" rx="3" fill="url(#labelBg)" stroke="rgba(212,175,55,0.15)" stroke-width="0.5"/>
  <rect x="160" y="204" width="80" height="87" rx="2" fill="none" stroke="rgba(212,175,55,0.08)" stroke-width="0.3"/>

  <text x="200" y="230" text-anchor="middle" font-family="Playfair Display, serif" font-size="11" fill="rgba(212,175,55,0.6)" letter-spacing="4">NIYU</text>
  <line x1="172" y1="238" x2="228" y2="238" stroke="rgba(212,175,55,0.2)" stroke-width="0.5"/>
  <text x="200" y="252" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="7" fill="rgba(212,175,55,0.35)" letter-spacing="2" font-style="italic">LUXURY</text>

  <polygon points="200,260 -4,2 0,-2" transform="translate(0,0)" fill="rgba(212,175,55,0.15)"/>
  <text x="200" y="278" text-anchor="middle" font-family="Playfair Display, serif" font-size="6" fill="rgba(212,175,55,0.25)" letter-spacing="3">EAU DE PARFUM</text>

  <!-- Bottom accent -->
  <path d="M145,340 C155,355 245,355 255,340" fill="rgba(212,175,55,0.03)" stroke="rgba(212,175,55,0.1)" stroke-width="0.5"/>
  <rect x="146" y="341" width="108" height="2" rx="1" fill="url(#gold)" opacity="0.2"/>
</svg>
