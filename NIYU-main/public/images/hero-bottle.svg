<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="bottleBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="30%" stop-color="#2a2a2a"/>
      <stop offset="60%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="bottleShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(212,175,55,0)" />
      <stop offset="30%" stop-color="rgba(212,175,55,0.15)" />
      <stop offset="50%" stop-color="rgba(212,175,55,0.05)" />
      <stop offset="100%" stop-color="rgba(212,175,55,0)" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F0E6C8"/>
      <stop offset="100%" stop-color="#B8960C"/>
    </linearGradient>
    <linearGradient id="goldLabel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(212,175,55,0.15)"/>
      <stop offset="50%" stop-color="rgba(212,175,55,0.05)"/>
      <stop offset="100%" stop-color="rgba(212,175,55,0.1)"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(212,175,55,0.08)"/>
      <stop offset="60%" stop-color="rgba(212,175,55,0.02)"/>
      <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
    </radialGradient>
    <radialGradient id="mist" cx="50%" cy="90%" r="60%">
      <stop offset="0%" stop-color="rgba(212,175,55,0.06)"/>
      <stop offset="50%" stop-color="rgba(139,115,85,0.03)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1200" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <rect width="800" height="1200" fill="url(#glow)"/>

  <!-- Mist at bottom -->
  <ellipse cx="400" cy="1050" rx="300" ry="120" fill="url(#mist)" filter="url(#softGlow)"/>

  <!-- Decorative gold lines - top -->
  <line x1="200" y1="80" x2="600" y2="80" stroke="rgba(212,175,55,0.15)" stroke-width="0.5"/>
  <line x1="250" y1="90" x2="550" y2="90" stroke="rgba(212,175,55,0.08)" stroke-width="0.5"/>

  <!-- BOTTLE -->
  <g transform="translate(400, 580)">

    <!-- Bottle glow behind -->
    <ellipse cx="0" cy="20" rx="90" ry="160" fill="rgba(212,175,55,0.03)" filter="url(#softGlow)"/>

    <!-- Bottle neck -->
    <rect x="-18" y="-230" width="36" height="60" rx="3" fill="url(#bottleBody)" stroke="rgba(212,175,55,0.15)" stroke-width="0.5"/>
    <rect x="-18" y="-230" width="36" height="60" rx="3" fill="url(#bottleShine)"/>

    <!-- Neck detail - gold band -->
    <rect x="-22" y="-175" width="44" height="6" rx="1" fill="url(#goldGrad)" opacity="0.6"/>
    <rect x="-22" y="-165" width="44" height="3" rx="1" fill="url(#goldGrad)" opacity="0.3"/>

    <!-- Bottle cap -->
    <rect x="-24" y="-260" width="48" height="32" rx="4" fill="url(#goldGrad)" opacity="0.7"/>
    <rect x="-20" y="-256" width="40" height="24" rx="3" fill="url(#goldGrad)" opacity="0.4"/>
    <line x1="-24" y1="-244" x2="24" y2="-244" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>

    <!-- Main body -->
    <path d="M-75,20 C-75,-100 -70,-160 -50,-175 L-22,-170 L-22,-170 L22,-170 L50,-175 C70,-160 75,-100 75,20 C75,80 70,130 60,150 L-60,150 C-70,130 -75,80 -75,20Z" fill="url(#bottleBody)" stroke="rgba(212,175,55,0.1)" stroke-width="0.5"/>

    <!-- Body shine -->
    <path d="M-75,20 C-75,-100 -70,-160 -50,-175 L-22,-170 L-22,-170 L22,-170 L50,-175 C70,-160 75,-100 75,20 C75,80 70,130 60,150 L-60,150 C-70,130 -75,80 -75,20Z" fill="url(#bottleShine)"/>

    <!-- Left edge highlight -->
    <path d="M-72,10 C-72,-90 -67,-155 -48,-170" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" fill="none"/>

    <!-- Gold label area -->
    <rect x="-45" y="-100" width="90" height="140" rx="4" fill="url(#goldLabel)" stroke="rgba(212,175,55,0.2)" stroke-width="0.5"/>

    <!-- Label border -->
    <rect x="-38" y="-93" width="76" height="126" rx="2" fill="none" stroke="rgba(212,175,55,0.15)" stroke-width="0.3"/>
    <rect x="-35" y="-90" width="70" height="120" rx="2" fill="none" stroke="rgba(212,175,55,0.08)" stroke-width="0.3"/>

    <!-- Label text lines -->
    <text x="0" y="-55" text-anchor="middle" font-family="Playfair Display, serif" font-size="14" fill="rgba(212,175,55,0.7)" letter-spacing="6">NIYU</text>
    <line x1="-20" y1="-42" x2="20" y2="-42" stroke="rgba(212,175,55,0.3)" stroke-width="0.5"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="9" fill="rgba(212,175,55,0.4)" letter-spacing="3" font-style="italic">PARIS</text>

    <!-- Decorative diamond -->
    <polygon points="0,-10 -6,-2 0,6 6,-2" fill="rgba(212,175,55,0.2)" stroke="rgba(212,175,55,0.15)" stroke-width="0.3"/>
    <polygon points="0,-8 -4,-2 0,4 4,-2" fill="rgba(212,175,55,0.1)"/>

    <text x="0" y="15" text-anchor="middle" font-family="Playfair Display, serif" font-size="8" fill="rgba(212,175,55,0.3)" letter-spacing="4">EAU DE PARFUM</text>

    <!-- Liquid level -->
    <path d="M-65,60 C-65,80 -60,120 -55,140 L55,140 C60,120 65,80 65,60 C40,55 -40,55 -65,60Z" fill="rgba(212,175,55,0.04)"/>
    <path d="M-65,60 C-65,80 -60,120 -55,140 L55,140 C60,120 65,80 65,60" stroke="rgba(212,175,55,0.08)" stroke-width="0.5" fill="none"/>

    <!-- Bottom gold accent -->
    <rect x="-60" y="142" width="120" height="2" rx="1" fill="url(#goldGrad)" opacity="0.3"/>
    <rect x="-50" y="146" width="100" height="1" rx="1" fill="rgba(212,175,55,0.1)"/>

    <!-- Side decorative lines -->
    <line x1="-68" y1="-120" x2="-68" y2="120" stroke="rgba(212,175,55,0.05)" stroke-width="0.3"/>
    <line x1="68" y1="-120" x2="68" y2="120" stroke="rgba(212,175,55,0.05)" stroke-width="0.3"/>
  </g>

  <!-- Gold particles -->
  <circle cx="150" cy="300" r="2" fill="rgba(212,175,55,0.2)" filter="url(#glowFilter)"/>
  <circle cx="650" cy="250" r="1.5" fill="rgba(212,175,55,0.15)" filter="url(#glowFilter)"/>
  <circle cx="200" cy="600" r="1" fill="rgba(212,175,55,0.1)"/>
  <circle cx="600" cy="550" r="1.5" fill="rgba(212,175,55,0.12)"/>
  <circle cx="100" cy="800" r="2" fill="rgba(212,175,55,0.08)" filter="url(#glowFilter)"/>
  <circle cx="700" cy="750" r="1" fill="rgba(212,175,55,0.1)"/>
  <circle cx="300" cy="200" r="1" fill="rgba(212,175,55,0.08)"/>
  <circle cx="500" cy="180" r="1.5" fill="rgba(212,175,55,0.06)"/>
  <circle cx="680" cy="400" r="0.8" fill="rgba(212,175,55,0.08)"/>
  <circle cx="120" cy="450" r="0.8" fill="rgba(212,175,55,0.06)"/>

  <!-- Smoke wisps -->
  <g opacity="0.04">
    <ellipse cx="300" cy="950" rx="80" ry="30" fill="#D4AF37" filter="url(#softGlow)"/>
    <ellipse cx="500" cy="980" rx="100" ry="35" fill="#D4AF37" filter="url(#softGlow)"/>
    <ellipse cx="400" cy="920" rx="60" ry="20" fill="#D4AF37" filter="url(#softGlow)"/>
  </g>

  <!-- Decorative gold lines - bottom -->
  <line x1="250" y1="1100" x2="550" y2="1100" stroke="rgba(212,175,55,0.08)" stroke-width="0.5"/>
  <line x1="200" y1="1110" x2="600" y2="1110" stroke="rgba(212,175,55,0.05)" stroke-width="0.3"/>
</svg>
