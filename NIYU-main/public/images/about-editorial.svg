<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" width="600" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/><stop offset="50%" stop-color="#F0E6C8"/><stop offset="100%" stop-color="#B8960C"/>
    </linearGradient>
    <linearGradient id="bottleBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/><stop offset="50%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(212,175,55,0)"/><stop offset="30%" stop-color="rgba(212,175,55,0.08)"/><stop offset="100%" stop-color="rgba(212,175,55,0)"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="600" height="750" fill="url(#bg)"/>

  <!-- Decorative elements -->
  <line x1="50" y1="40" x2="550" y2="40" stroke="rgba(212,175,55,0.08)" stroke-width="0.3"/>
  <line x1="100" y1="48" x2="500" y2="48" stroke="rgba(212,175,55,0.04)" stroke-width="0.3"/>

  <!-- Central glow -->
  <ellipse cx="300" cy="400" rx="200" ry="250" fill="rgba(212,175,55,0.02)" filter="url(#glow)"/>

  <!-- Main perfume bottle -->
  <g transform="translate(300, 350)">
    <!-- Glow -->
    <ellipse cx="0" cy="30" rx="70" ry="150" fill="rgba(212,175,55,0.03)" filter="url(#glow)"/>

    <!-- Cap -->
    <rect x="-20" y="-230" width="40" height="28" rx="3" fill="url(#gold)" opacity="0.55"/>
    <rect x="-16" y="-226" width="32" height="20" rx="2" fill="url(#gold)" opacity="0.3"/>
    <line x1="-20" y1="-214" x2="20" y2="-214" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>

    <!-- Neck -->
    <rect x="-16" y="-202" width="32" height="52" rx="3" fill="url(#bottleBody)" stroke="rgba(212,175,55,0.1)" stroke-width="0.5"/>
    <rect x="-16" y="-202" width="32" height="52" rx="3" fill="url(#shine)"/>

    <!-- Gold ring -->
    <rect x="-19" y="-152" width="38" height="5" rx="1" fill="url(#gold)" opacity="0.45"/>

    <!-- Body -->
    <path d="M-65,20 C-65,-90 -60,-145 -42,-150 L42,-150 C60,-145 65,-90 65,20 C65,90 60,140 55,160 L-55,160 C-60,140 -65,90 -65,20Z" fill="url(#bottleBody)" stroke="rgba(212,175,55,0.08)" stroke-width="0.5"/>
    <path d="M-65,20 C-65,-90 -60,-145 -42,-150 L42,-150 C60,-145 65,-90 65,20 C65,90 60,140 55,160 L-55,160 C-60,140 -65,90 -65,20Z" fill="url(#shine)"/>

    <!-- Label -->
    <rect x="-38" y="-80" width="76" height="110" rx="3" fill="rgba(212,175,55,0.06)" stroke="rgba(212,175,55,0.12)" stroke-width="0.5"/>
    <rect x="-34" y="-76" width="68" height="102" rx="2" fill="none" stroke="rgba(212,175,55,0.06)" stroke-width="0.3"/>

    <text x="0" y="-40" text-anchor="middle" font-family="Playfair Display, serif" font-size="12" fill="rgba(212,175,55,0.5)" letter-spacing="5">NIYU</text>
    <line x1="-25" y1="-28" x2="25" y2="-28" stroke="rgba(212,175,55,0.2)" stroke-width="0.5"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="8" fill="rgba(212,175,55,0.3)" letter-spacing="2" font-style="italic">LUXURY</text>
    <polygon points="0,0 -5,5 0,10 5,5" fill="rgba(212,175,55,0.12)"/>
    <text x="0" y="22" text-anchor="middle" font-family="Playfair Display, serif" font-size="6" fill="rgba(212,175,55,0.2)" letter-spacing="3">EAU DE PARFUM</text>

    <!-- Bottom accent -->
    <rect x="-52" y="155" width="104" height="2" rx="1" fill="url(#gold)" opacity="0.2"/>
  </g>

  <!-- Decorative line -->
  <line x1="100" y1="580" x2="500" y2="580" stroke="rgba(212,175,55,0.06)" stroke-width="0.3"/>

  <!-- Small floating dots -->
  <circle cx="120" cy="200" r="1.5" fill="rgba(212,175,55,0.08)"/>
  <circle cx="480" cy="180" r="1" fill="rgba(212,175,55,0.06)"/>
  <circle cx="140" cy="500" r="1.2" fill="rgba(212,175,55,0.05)"/>
  <circle cx="460" cy="520" r="0.8" fill="rgba(212,175,55,0.07)"/>
  <circle cx="200" cy="150" r="0.8" fill="rgba(212,175,55,0.04)"/>
  <circle cx="400" cy="140" r="1" fill="rgba(212,175,55,0.05)"/>

  <!-- Bottom text -->
  <text x="300" y="650" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="11" fill="rgba(212,175,55,0.15)" letter-spacing="6" font-style="italic">Handmade · Pure · Timeless</text>
  <line x1="200" y1="665" x2="400" y2="665" stroke="rgba(212,175,55,0.04)" stroke-width="0.3"/>
</svg>
