<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <pattern id="goldLines" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="20" x2="40" y2="20" stroke="rgba(212,175,55,0.03)" stroke-width="0.3"/>
      <line x1="20" y1="0" x2="20" y2="40" stroke="rgba(212,175,55,0.02)" stroke-width="0.3"/>
    </pattern>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="rgba(212,175,55,0.04)"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#goldLines)"/>
  <rect width="200" height="200" fill="url(#dots)"/>
  <line x1="20" y1="100" x2="180" y2="100" stroke="rgba(212,175,55,0.06)" stroke-width="0.3"/>
  <line x1="100" y1="20" x2="100" y2="180" stroke="rgba(212,175,55,0.04)" stroke-width="0.3"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="rgba(212,175,55,0.04)" stroke-width="0.3"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="rgba(212,175,55,0.02)" stroke-width="0.3"/>
  <circle cx="100" cy="100" r="2" fill="rgba(212,175,55,0.08)"/>
</svg>
